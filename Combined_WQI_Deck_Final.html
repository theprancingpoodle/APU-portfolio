    &lt;div class=&quot;si-param-name&quot;&gt;Coliform&lt;/div&gt;
    &lt;div class=&quot;si-param-full&quot;&gt;Higher is worse · Class B max ≤ 500 MPN / 100 mL&lt;/div&gt;
    &lt;div class=&quot;si-weight-badge&quot;&gt;Weight 40 %&lt;/div&gt;
    &lt;hr class=&quot;si-divider&quot;&gt;

    &lt;div class=&quot;si-lake-block&quot;&gt;
      &lt;div class=&quot;si-lake-name&quot;&gt;&lt;span class=&quot;dot dot-v&quot;&gt;&lt;/span&gt;Varthur Lake&lt;/div&gt;
      &lt;div class=&quot;si-raw-val&quot;&gt;Measured: &lt;strong&gt;132 MPN / 100 mL&lt;/strong&gt;&lt;/div&gt;
      &lt;div class=&quot;si-logic&quot;&gt;
        Well below the 500 limit.
        Score = 100 − (132 / 500 × 40) = 100 − 10.56
      &lt;/div&gt;
      &lt;div class=&quot;si-score-row&quot;&gt;
        &lt;div class=&quot;si-score-number&quot; style=&quot;color:var(--varthur)&quot;&gt;89.44&lt;/div&gt;
        &lt;div class=&quot;si-score-label&quot;&gt;/ 100&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;si-bar-bg&quot;&gt;&lt;div class=&quot;si-bar-fill&quot; style=&quot;width:0%;background:var(--varthur)&quot; data-w=&quot;89.44&quot;&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;hr class=&quot;si-divider&quot;&gt;
    &lt;div class=&quot;si-lake-block&quot;&gt;
      &lt;div class=&quot;si-lake-name&quot;&gt;&lt;span class=&quot;dot dot-h&quot;&gt;&lt;/span&gt;Hesaraghatta&lt;/div&gt;
      &lt;div class=&quot;si-raw-val&quot;&gt;Measured: &lt;strong&gt;1450 MPN / 100 mL&lt;/strong&gt;&lt;/div&gt;
      &lt;div class=&quot;si-logic&quot;&gt;
        Nearly 3× the Class B limit. Score drops below 60 — scaled from 500 to 2000.
        Score = 60 × (1 − (1450 − 500) / 1500) = 60 × 0.367
      &lt;/div&gt;
      &lt;div class=&quot;si-score-row&quot;&gt;
        &lt;div class=&quot;si-score-number&quot; style=&quot;color:var(--hesara)&quot;&gt;22.00&lt;/div&gt;
        &lt;div class=&quot;si-score-label&quot;&gt;/ 100&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;si-bar-bg&quot;&gt;&lt;div class=&quot;si-bar-fill&quot; style=&quot;width:0%;background:var(--hesara)&quot; data-w=&quot;22&quot;&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- pH --&gt;
  &lt;div class=&quot;si-card ph&quot;&gt;
    &lt;div class=&quot;si-param-name&quot;&gt;pH&lt;/div&gt;
    &lt;div class=&quot;si-param-full&quot;&gt;Must stay within range 6.5 – 8.5&lt;/div&gt;
    &lt;div class=&quot;si-weight-badge&quot;&gt;Weight 20 %&lt;/div&gt;
    &lt;hr class=&quot;si-divider&quot;&gt;

    &lt;div class=&quot;si-lake-block&quot;&gt;
      &lt;div class=&quot;si-lake-name&quot;&gt;&lt;span class=&quot;dot dot-v&quot;&gt;&lt;/span&gt;Varthur Lake&lt;/div&gt;
      &lt;div class=&quot;si-raw-val&quot;&gt;Measured: &lt;strong&gt;8.08&lt;/strong&gt;&lt;/div&gt;
      &lt;div class=&quot;si-logic&quot;&gt;
        Inside the 6.5 – 8.5 range → full score
      &lt;/div&gt;
      &lt;div class=&quot;si-score-row&quot;&gt;
        &lt;div class=&quot;si-score-number&quot; style=&quot;color:var(--varthur)&quot;&gt;100&lt;/div&gt;
        &lt;div class=&quot;si-score-label&quot;&gt;/ 100&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;si-bar-bg&quot;&gt;&lt;div class=&quot;si-bar-fill&quot; style=&quot;width:0%;background:var(--varthur)&quot; data-w=&quot;100&quot;&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;hr class=&quot;si-divider&quot;&gt;
    &lt;div class=&quot;si-lake-block&quot;&gt;
      &lt;div class=&quot;si-lake-name&quot;&gt;&lt;span class=&quot;dot dot-h&quot;&gt;&lt;/span&gt;Hesaraghatta&lt;/div&gt;
      &lt;div class=&quot;si-raw-val&quot;&gt;Measured: &lt;strong&gt;9.34&lt;/strong&gt;&lt;/div&gt;
      &lt;div class=&quot;si-logic&quot;&gt;
        Exceeds upper limit of 8.5. Zero at pH 10.5 (2 units above limit).
        Score = (10.5 − 9.34) / 2 × 100 = 1.16 / 2 × 100
      &lt;/div&gt;
      &lt;div class=&quot;si-score-row&quot;&gt;
        &lt;div class=&quot;si-score-number&quot; style=&quot;color:var(--hesara)&quot;&gt;58.00&lt;/div&gt;
        &lt;div class=&quot;si-score-label&quot;&gt;/ 100&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;si-bar-bg&quot;&gt;&lt;div class=&quot;si-bar-fill&quot; style=&quot;width:0%;background:var(--hesara)&quot; data-w=&quot;58&quot;&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- DO --&gt;
  &lt;div class=&quot;si-card do_&quot;&gt;
    &lt;div class=&quot;si-param-name&quot;&gt;DO&lt;/div&gt;
    &lt;div class=&quot;si-param-full&quot;&gt;Higher is better · Class B minimum ≥ 5 mg/L&lt;/div&gt;
    &lt;div class=&quot;si-weight-badge&quot;&gt;Weight 20 %&lt;/div&gt;
    &lt;hr class=&quot;si-divider&quot;&gt;

    &lt;div class=&quot;si-lake-block&quot;&gt;
      &lt;div class=&quot;si-lake-name&quot;&gt;&lt;span class=&quot;dot dot-v&quot;&gt;&lt;/span&gt;Varthur Lake&lt;/div&gt;
      &lt;div class=&quot;si-raw-val&quot;&gt;Measured: &lt;strong&gt;6.24 mg/L&lt;/strong&gt;&lt;/div&gt;
      &lt;div class=&quot;si-logic&quot;&gt;
        Between 5 and 7 mg/L. Score = 60 + (6.24 − 5) / 2 × 40 = 60 + 24.8
      &lt;/div&gt;
      &lt;div class=&quot;si-score-row&quot;&gt;
        &lt;div class=&quot;si-score-number&quot; style=&quot;color:var(--varthur)&quot;&gt;84.80&lt;/div&gt;
        &lt;div class=&quot;si-score-label&quot;&gt;/ 100&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;si-bar-bg&quot;&gt;&lt;div class=&quot;si-bar-fill&quot; style=&quot;width:0%;background:var(--varthur)&quot; data-w=&quot;84.8&quot;&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;hr class=&quot;si-divider&quot;&gt;
    &lt;div class=&quot;si-lake-block&quot;&gt;
      &lt;div class=&quot;si-lake-name&quot;&gt;&lt;span class=&quot;dot dot-h&quot;&gt;&lt;/span&gt;Hesaraghatta&lt;/div&gt;
      &lt;div class=&quot;si-raw-val&quot;&gt;Measured: &lt;strong&gt;4.34 mg/L&lt;/strong&gt;&lt;/div&gt;
      &lt;div class=&quot;si-logic&quot;&gt;
        Below the Class B minimum of 5 mg/L.
        Score = (4.34 / 5) × 60 = 0.868 × 60
      &lt;/div&gt;
      &lt;div class=&quot;si-score-row&quot;&gt;
        &lt;div class=&quot;si-score-number&quot; style=&quot;color:var(--hesara)&quot;&gt;52.08&lt;/div&gt;
        &lt;div class=&quot;si-score-label&quot;&gt;/ 100&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;si-bar-bg&quot;&gt;&lt;div class=&quot;si-bar-fill&quot; style=&quot;width:0%;background:var(--hesara)&quot; data-w=&quot;52.08&quot;&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- TURBIDITY --&gt;
  &lt;div class=&quot;si-card turb&quot;&gt;
    &lt;div class=&quot;si-param-name&quot;&gt;Turbidity&lt;/div&gt;
    &lt;div class=&quot;si-param-full&quot;&gt;Higher is worse · Ideal ≤ 5 NTU · Zero score at 20 NTU&lt;/div&gt;
    &lt;div class=&quot;si-weight-badge&quot;&gt;Weight 20 %&lt;/div&gt;
    &lt;hr class=&quot;si-divider&quot;&gt;

    &lt;div class=&quot;si-lake-block&quot;&gt;
      &lt;div class=&quot;si-lake-name&quot;&gt;&lt;span class=&quot;dot dot-v&quot;&gt;&lt;/span&gt;Varthur Lake&lt;/div&gt;
      &lt;div class=&quot;si-raw-val&quot;&gt;Measured: &lt;strong&gt;9 NTU&lt;/strong&gt;&lt;/div&gt;
      &lt;div class=&quot;si-logic&quot;&gt;
        Above 5 NTU — score drops linearly to zero at 20 NTU.
        Score = (1 − (9 − 5) / 15) × 100 = (1 − 4/15) × 100
      &lt;/div&gt;
      &lt;div class=&quot;si-score-row&quot;&gt;
        &lt;div class=&quot;si-score-number&quot; style=&quot;color:var(--varthur)&quot;&gt;73.33&lt;/div&gt;
        &lt;div class=&quot;si-score-label&quot;&gt;/ 100&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;si-bar-bg&quot;&gt;&lt;div class=&quot;si-bar-fill&quot; style=&quot;width:0%;background:var(--varthur)&quot; data-w=&quot;73.33&quot;&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;hr class=&quot;si-divider&quot;&gt;
    &lt;div class=&quot;si-lake-block&quot;&gt;
      &lt;div class=&quot;si-lake-name&quot;&gt;&lt;span class=&quot;dot dot-h&quot;&gt;&lt;/span&gt;Hesaraghatta&lt;/div&gt;
      &lt;div class=&quot;si-raw-val&quot;&gt;Measured: &lt;strong&gt;5.46 NTU&lt;/strong&gt;&lt;/div&gt;
      &lt;div class=&quot;si-logic&quot;&gt;
        Just above the ideal 5 NTU threshold — very slight penalty.
        Score = (1 − (5.46 − 5) / 15) × 100 = (1 − 0.46/15) × 100
      &lt;/div&gt;
      &lt;div class=&quot;si-score-row&quot;&gt;
        &lt;div class=&quot;si-score-number&quot; style=&quot;color:var(--hesara)&quot;&gt;96.93&lt;/div&gt;
        &lt;div class=&quot;si-score-label&quot;&gt;/ 100&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;si-bar-bg&quot;&gt;&lt;div class=&quot;si-bar-fill&quot; style=&quot;width:0%;background:var(--hesara)&quot; data-w=&quot;96.93&quot;&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

&lt;/div&gt;&lt;!-- /subindex-grid --&gt;

&lt;hr class=&quot;section-divider&quot;&gt;

&lt;!-- SECTION 04: FINAL WQI CALCULATION --&gt;
&lt;div class=&quot;section-header&quot;&gt;
  &lt;div class=&quot;section-number&quot;&gt;04 — Final WQI Calculation&lt;/div&gt;
  &lt;div class=&quot;section-title&quot;&gt;Weighted Average of Sub-Indices&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;formula-banner&quot;&gt;
  &lt;div class=&quot;formula-label&quot;&gt;Formula&lt;/div&gt;
  &lt;div class=&quot;formula-eq&quot;&gt;
    WQI = (&lt;span class=&quot;fw&quot;&gt;Coliform&lt;/span&gt; × 0.40) + (&lt;span class=&quot;fw&quot;&gt;pH&lt;/span&gt; × 0.20) + (&lt;span class=&quot;fw&quot;&gt;DO&lt;/span&gt; × 0.20) + (&lt;span class=&quot;fw&quot;&gt;Turbidity&lt;/span&gt; × 0.20)
  &lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;calc-grid&quot;&gt;

  &lt;div class=&quot;calc-card v&quot;&gt;
    &lt;div class=&quot;calc-lake-name&quot;&gt;&lt;span class=&quot;dot dot-v&quot;&gt;&lt;/span&gt;Varthur Lake&lt;/div&gt;
    &lt;div class=&quot;calc-steps&quot;&gt;
      &lt;div class=&quot;calc-step&quot;&gt;
        &lt;div class=&quot;calc-step-desc&quot;&gt;&lt;span class=&quot;param-label&quot;&gt;Coliform&lt;/span&gt; sub-index × weight&lt;/div&gt;
        &lt;div class=&quot;calc-step-math&quot; style=&quot;color:#e05050&quot;&gt;89.44 × 0.40&lt;/div&gt;
        &lt;div class=&quot;calc-step-result&quot; style=&quot;color:var(--varthur)&quot;&gt;=&amp;nbsp;35.78&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;calc-step&quot;&gt;
        &lt;div class=&quot;calc-step-desc&quot;&gt;&lt;span class=&quot;param-label&quot;&gt;pH&lt;/span&gt; sub-index × weight&lt;/div&gt;
        &lt;div class=&quot;calc-step-math&quot; style=&quot;color:var(--water)&quot;&gt;100.00 × 0.20&lt;/div&gt;
        &lt;div class=&quot;calc-step-result&quot; style=&quot;color:var(--varthur)&quot;&gt;=&amp;nbsp;20.00&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;calc-step&quot;&gt;
        &lt;div class=&quot;calc-step-desc&quot;&gt;&lt;span class=&quot;param-label&quot;&gt;DO&lt;/span&gt; sub-index × weight&lt;/div&gt;
        &lt;div class=&quot;calc-step-math&quot; style=&quot;color:var(--accent)&quot;&gt;84.80 × 0.20&lt;/div&gt;
        &lt;div class=&quot;calc-step-result&quot; style=&quot;color:var(--varthur)&quot;&gt;=&amp;nbsp;16.96&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;calc-step&quot;&gt;
        &lt;div class=&quot;calc-step-desc&quot;&gt;&lt;span class=&quot;param-label&quot;&gt;Turbidity&lt;/span&gt; sub-index × weight&lt;/div&gt;
        &lt;div class=&quot;calc-step-math&quot; style=&quot;color:#f0a030&quot;&gt;73.33 × 0.20&lt;/div&gt;
        &lt;div class=&quot;calc-step-result&quot; style=&quot;color:var(--varthur)&quot;&gt;=&amp;nbsp;14.67&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;calc-sum-line&quot;&gt;
      &lt;div class=&quot;calc-sum-label&quot;&gt;Final WQI&lt;/div&gt;
      &lt;div class=&quot;calc-sum-eq&quot;&gt;35.78 + 20.00 + 16.96 + 14.67&lt;/div&gt;
      &lt;div class=&quot;calc-final-score&quot;&gt;87.40&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;calc-card h&quot;&gt;
    &lt;div class=&quot;calc-lake-name&quot;&gt;&lt;span class=&quot;dot dot-h&quot;&gt;&lt;/span&gt;Hesaraghatta Reservoir&lt;/div&gt;
    &lt;div class=&quot;calc-steps&quot;&gt;
      &lt;div class=&quot;calc-step&quot;&gt;
        &lt;div class=&quot;calc-step-desc&quot;&gt;&lt;span class=&quot;param-label&quot;&gt;Coliform&lt;/span&gt; sub-index × weight&lt;/div&gt;
        &lt;div class=&quot;calc-step-math&quot; style=&quot;color:#e05050&quot;&gt;22.00 × 0.40&lt;/div&gt;
        &lt;div class=&quot;calc-step-result&quot; style=&quot;color:var(--hesara)&quot;&gt;=&amp;nbsp;8.80&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;calc-step&quot;&gt;
        &lt;div class=&quot;calc-step-desc&quot;&gt;&lt;span class=&quot;param-label&quot;&gt;pH&lt;/span&gt; sub-index × weight&lt;/div&gt;
        &lt;div class=&quot;calc-step-math&quot; style=&quot;color:var(--water)&quot;&gt;58.00 × 0.20&lt;/div&gt;
        &lt;div class=&quot;calc-step-result&quot; style=&quot;color:var(--hesara)&quot;&gt;=&amp;nbsp;11.60&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;calc-step&quot;&gt;
        &lt;div class=&quot;calc-step-desc&quot;&gt;&lt;span class=&quot;param-label&quot;&gt;DO&lt;/span&gt; sub-index × weight&lt;/div&gt;
        &lt;div class=&quot;calc-step-math&quot; style=&quot;color:var(--accent)&quot;&gt;52.08 × 0.20&lt;/div&gt;
        &lt;div class=&quot;calc-step-result&quot; style=&quot;color:var(--hesara)&quot;&gt;=&amp;nbsp;10.42&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;calc-step&quot;&gt;
        &lt;div class=&quot;calc-step-desc&quot;&gt;&lt;span class=&quot;param-label&quot;&gt;Turbidity&lt;/span&gt; sub-index × weight&lt;/div&gt;
        &lt;div class=&quot;calc-step-math&quot; style=&quot;color:#f0a030&quot;&gt;96.93 × 0.20&lt;/div&gt;
        &lt;div class=&quot;calc-step-result&quot; style=&quot;color:var(--hesara)&quot;&gt;=&amp;nbsp;19.39&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;calc-sum-line&quot;&gt;
      &lt;div class=&quot;calc-sum-label&quot;&gt;Final WQI&lt;/div&gt;
      &lt;div class=&quot;calc-sum-eq&quot;&gt;8.80 + 11.60 + 10.42 + 19.39&lt;/div&gt;
      &lt;div class=&quot;calc-final-score&quot;&gt;50.20&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

&lt;/div&gt;&lt;!-- /calc-grid --&gt;

&lt;div class=&quot;footnote&quot;&gt;
  Reference: BIS IS 2296 : 1992 — Designated Best Use Class B (Outdoor Bathing — Organised). Source: Central Pollution Control Board.
  Parameters used: Total Coliform (weight 40%), pH (20%), Dissolved Oxygen (20%), Turbidity (20%).
  Coliform carries the highest weight because microbial contamination is the principal health risk in contact recreation.
  BOD (Class B limit: ≤ 3 mg/L, 5-day at 20 °C) was not measured at either site and is excluded from this index.
  Turbidity was added as a practical proxy for visual water quality in the absence of BOD data.
&lt;/div&gt;
