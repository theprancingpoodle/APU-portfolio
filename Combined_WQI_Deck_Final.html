:root {

* { box-sizing:border-box; }
html, body {
  margin:0; padding:0;

  color:var(--text);
  font-family:Arial, sans-serif;
  scroll-behavior:smooth;
}
header {

}

}
header p {
  margin:6px 0 0;
  color:var(--muted);
  font-size:14px;
  line-height:1.5;
}

  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:14px;
}

  color:var(--text);
  text-decoration:none;
  font-size:13px;
  padding:8px 10px;
  border:1px solid var(--border);
  border-radius:999px;
  background:var(--panel);
}
nav a:hover {
  border-color:var(--accent);
}
main {
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:28px;
}
.slide-block {
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 8px 30px rgba(0,0,0,.2);
}
.slide-meta {
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:center;
  background:var(--panel-2);
}
.slide-meta .label {
  font-weight:700;
  font-size:14px;
}
.slide-meta .file {
  font-size:12px;
  color:var(--muted);
  text-align:right;
}
iframe {
  width:100%;
  height:100vh;
  border:0;
  background:#fff;
  display:block;
}
@media (max-width:768px) {
  iframe { height:85vh; }
  header { position:static; }
  .slide-meta {
    flex-direction:column;
    align-items:flex-start;
  }
  .slide-meta .file {
    text-align:left;
  }
}

      &lt;div class=&quot;reason-item&quot;&gt;
        &lt;span class=&quot;reason-num&quot;&gt;1&lt;/span&gt;
        &lt;p class=&quot;reason-text&quot;&gt;Different parameters have different real-world implications and dangers — some are more crucial than others, hence &lt;strong style=&quot;color:var(--mist)&quot;&gt;weighting is important&lt;/strong&gt;&lt;/p&gt;
      &lt;/div&gt;
      &lt;div class=&quot;reason-item&quot;&gt;
        &lt;span class=&quot;reason-num&quot;&gt;2&lt;/span&gt;
        &lt;p class=&quot;reason-text&quot;&gt;Varying use-cases need specific sets of parameters to be measured and compared to &lt;strong style=&quot;color:var(--mist)&quot;&gt;varying standards&lt;/strong&gt;&lt;/p&gt;

      &lt;div class=&quot;reason-item&quot;&gt;

      &lt;div class=&quot;reason-item&quot;&gt;

        &lt;p class=&quot;reason-text&quot;&gt;Makes &lt;strong style=&quot;color:var(--mist)&quot;&gt;comparison&lt;/strong&gt; among water bodies easier and enables &lt;strong style=&quot;color:var(--mist)&quot;&gt;decision-making&lt;/strong&gt;&lt;/p&gt;

  &lt;!-- Formulas section --&gt;
  &lt;div&gt;
    &lt;p style=&quot;font-size:15px; font-weight:300; color:#c8e8f0; line-height:1.65; margin-bottom:18px;&quot;&gt;The WQIs and sub-indices have been designed to range from &lt;strong style=&quot;color:var(--mist)&quot;&gt;0 to 100&lt;/strong&gt;, with a higher score indicating &lt;strong style=&quot;color:var(--mist)&quot;&gt;better water suitability&lt;/strong&gt; for a designated purpose.&lt;/p&gt;
    &lt;div class=&quot;section-label&quot;&gt;Formulas adopted for our calculations&lt;/div&gt;
    &lt;div class=&quot;formulas-grid&quot;&gt;

      &lt;!-- Final WQI — full width --&gt;
      &lt;div class=&quot;formula-block full&quot;&gt;
        &lt;div class=&quot;formula-label final&quot;&gt;Final WQI&lt;/div&gt;
        &lt;div class=&quot;formula-content&quot;&gt;
          \[ WQI = \frac{\displaystyle\sum_{i=1}^{n}(w_i \times SI_i)}{\displaystyle\sum_{i=1}^{n} w_i} \]
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;!-- Higher is worse --&gt;
      &lt;div class=&quot;formula-block&quot;&gt;
        &lt;div class=&quot;formula-label&quot;&gt;Sub-index — Higher is worse&lt;/div&gt;
        &lt;div class=&quot;formula-content&quot;&gt;
          \[ SI_i = \left(1 - \frac{X_i - X_{ideal}}{X_{max} - X_{ideal}}\right) \times 100 \]
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;!-- Higher is better --&gt;
      &lt;div class=&quot;formula-block&quot;&gt;
        &lt;div class=&quot;formula-label&quot;&gt;Sub-index — Higher is better&lt;/div&gt;
        &lt;div class=&quot;formula-content&quot;&gt;
          \[ SI_i = \frac{X_i - X_{min}}{X_{ideal} - X_{min}} \times 100 \]
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;!-- Range based — full width --&gt;
      &lt;div class=&quot;formula-block full&quot;&gt;
        &lt;div class=&quot;formula-label&quot;&gt;Sub-index — Range based&lt;/div&gt;
        &lt;div class=&quot;formula-content&quot;&gt;
          &lt;p class=&quot;formula-note-text&quot;&gt;\(SI_i = 100\) within acceptable range; decreases linearly outside&lt;/p&gt;
        &lt;/div&gt;
      &lt;/div&gt;

  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 10px;
}
.section-title {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: clamp(26px, 4vw, 42px); font-weight: 800;
  color: var(--text); letter-spacing: 0.01em; line-height: 1.1;
  margin-bottom: 10px;
}
.section-desc {
  color: var(--mid); font-size: 15px; line-height: 1.75;
  max-width: 820px; margin-bottom: 2rem;
}
.section-desc strong { color: var(--text); }

/* CHART CARD */
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2rem 2rem 1.5rem;
}
.chart-card canvas { display: block; }

/* TWO COL */
.two-col {
  display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
}

/* LOLLIPOP CHART (SVG-based) */
.lollipop-wrap {
  padding: 1rem 0 0;
}
.lollipop-row {
  display: grid; grid-template-columns: 130px 1fr 1fr; gap: 0;
  align-items: center;
  margin-bottom: 22px;
}
.lollipop-label {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 15px; font-weight: 600; letter-spacing: 0.06em;
  color: var(--mid); text-align: right; padding-right: 18px;
  text-transform: uppercase;
}
.lollipop-track {
  position: relative; height: 26px;
}
.track-line {
  position: absolute; top: 50%; left: 0; right: 0;
  height: 1px; background: var(--border);
  transform: translateY(-50%);
}
.lollipop-bar-wrap {
  position: relative; height: 26px;
}
.lollipop-bar {
  position: absolute; top: 50%; height: 3px;
  transform: translateY(-50%);
  border-radius: 4px;
  transition: width 1.2s cubic-bezier(0.16,1,0.3,1);
}
.lollipop-circle {
  position: absolute; top: 50%; width: 16px; height: 16px;
  border-radius: 50%; border: 2.5px solid;
  transform: translate(-50%, -50%);
  transition: left 1.2s cubic-bezier(0.16,1,0.3,1);
  background: var(--bg);
}
.lollipop-val {
  position: absolute; top: 50%; transform: translateY(-50%);
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 14px; font-weight: 700;
  transition: left 1.2s cubic-bezier(0.16,1,0.3,1);
  white-space: nowrap; padding-left: 8px;
}

/* SCORE CARDS */
.score-cards {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px;
  margin-bottom: 2rem;
}
.score-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 24px 22px 20px;
  position: relative; overflow: hidden;
}
.score-card::before {
  content: &#x27;&#x27;; position: absolute; top: 0; left: 0; right: 0; height: 3px;
}
.score-card.fisheries::before { background: var(--accent); }
.score-card.recreation::before { background: var(--orange); }
.score-card.drinking::before { background: var(--green); }

.sc-type {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 12px; font-weight: 600; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--mid); margin-bottom: 12px;
}
.sc-scores {
  display: flex; align-items: flex-end; gap: 12px; margin-bottom: 10px;
}
.sc-big {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 48px; font-weight: 800; line-height: 1;
}
.sc-big.v { color: var(--varthur); }
.sc-big.h { color: var(--hesara); }
.sc-vs {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 14px; font-weight: 600; color: var(--mid);
  padding-bottom: 8px;
}
.sc-diff {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.06em;
}
.sc-diff.pos { color: var(--varthur); }
.sc-winner {
  font-size: 13px; color: var(--mid); line-height: 1.5; margin-top: 8px;
}

/* DUMBBELL */
.dumbbell-wrap { padding: 8px 0; }
.db-row {
  display: flex; align-items: center; gap: 0;
  margin-bottom: 18px;
  opacity: 0; transform: translateX(-20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.db-row.visible { opacity: 1; transform: translateX(0); }
.db-label {
  width: 160px; min-width: 160px;
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 15px; font-weight: 600; letter-spacing: 0.06em;
  text-transform: uppercase; color: var(--mid);
  text-align: right; padding-right: 20px;
}
.db-track {
  flex: 1; position: relative; height: 28px;
}
.db-axis {
  position: absolute; top: 0; bottom: 0; width: 1px;
  background: rgba(100,200,255,0.15);
}
.db-connector {
  position: absolute; top: 50%; height: 2px;
  background: rgba(100,200,255,0.2);
  transform: translateY(-50%);
  transition: left 1s ease, width 1s ease;
}
.db-dot {
  position: absolute; top: 50%; width: 14px; height: 14px;
  border-radius: 50%; border: 2px solid;
  transform: translate(-50%, -50%);
  transition: left 1s cubic-bezier(0.34,1.56,0.64,1);
}
.db-dot.varthur { border-color: var(--varthur); background: rgba(240,192,0,0.3); }
.db-dot.hesara { border-color: var(--hesara); background: rgba(184,144,240,0.3); }

/* KEY INSIGHT BOX */
.insight-box {
  background: linear-gradient(135deg, rgba(64,200,240,0.06) 0%, rgba(184,144,240,0.06) 100%);
  border: 1px solid rgba(64,200,240,0.25);
  border-radius: 20px;
  padding: 2.5rem 2.5rem 2rem;
  margin: 2.5rem 0;
  position: relative; overflow: hidden;
}
.insight-box::before {
  content: &#x27;&#x27;;
  position: absolute; top: -60px; right: -60px;
  width: 200px; height: 200px; border-radius: 50%;
  background: radial-gradient(circle, rgba(64,200,240,0.08) 0%, transparent 70%);
}
.insight-title {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 22px; font-weight: 800; letter-spacing: 0.05em;
  text-transform: uppercase; color: var(--accent); margin-bottom: 16px;
}
.insight-text {
  font-size: 16px; color: var(--mid); line-height: 1.8;
}
.insight-text strong { color: var(--text); }

.insight-bullets {
  margin-top: 16px; display: flex; flex-direction: column; gap: 10px;
}
.ib {
  display: flex; gap: 12px; align-items: flex-start;
}
.ib-dot {
  width: 8px; height: 8px; min-width: 8px; border-radius: 50%;
  margin-top: 7px;
}
.ib-text {
  font-size: 15px; color: var(--mid); line-height: 1.6;
}
.ib-text strong { color: var(--text); }

/* CLOSING */
.closing {
  border-top: 1px solid var(--border);
  padding-top: 3rem;
  margin-top: 2rem;
}
.closing-quote {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: clamp(20px, 3vw, 30px); font-weight: 600;
  line-height: 1.5; color: var(--text);
  font-style: italic;
  padding-left: 28px;
  border-left: 3px solid var(--accent);
  max-width: 860px;
}

/* WINNER TAG */
.winner-tag {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(240,192,0,0.12);
  border: 1px solid rgba(240,192,0,0.3);
  border-radius: 40px;
  padding: 4px 14px 4px 8px;
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 12px; font-weight: 700; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--varthur);
  margin-bottom: 18px;
}
.winner-tag span.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--varthur);
}

/* SPIDER / RADAR WRAPPER */
.radar-wrap {
  display: flex; justify-content: center; align-items: center;
  padding: 1rem 0;
}

/* table */
.compare-table {
  width: 100%; border-collapse: collapse;
}
.compare-table th, .compare-table td {
  padding: 14px 16px; text-align: left;
  font-size: 15px;
}
.compare-table th {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 13px; font-weight: 600; letter-spacing: 0.15em;
  text-transform: uppercase; color: var(--mid);
  border-bottom: 1px solid var(--border);
}
.compare-table td { border-bottom: 1px solid rgba(100,200,255,0.07); }
.compare-table tr:last-child td { border-bottom: none; }
.compare-table .wqi-type {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-weight: 700; font-size: 16px; letter-spacing: 0.04em;
}
.compare-table .v-score { color: var(--varthur); font-weight: 700; font-size: 17px; }
.compare-table .h-score { color: var(--hesara); font-weight: 700; font-size: 17px; }
.compare-table .winner-cell {
  color: var(--varthur); font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-weight: 700; letter-spacing: 0.06em;
}

@media (max-width: 700px) {
  .two-col { grid-template-columns: 1fr; }
  .score-cards { grid-template-columns: 1fr; }
}

&lt;div class=&quot;container&quot;&gt;

  &lt;!-- HEADER --&gt;
  &lt;div class=&quot;page-header&quot;&gt;
    &lt;div class=&quot;eyebrow&quot;&gt;Water Quality Index — Comparative Analysis&lt;/div&gt;
    &lt;h1&gt;Varthur vs&lt;br&gt;Hesaraghatta&lt;/h1&gt;

      A use-specific comparison of three Water Quality Indices across &lt;strong&gt;Fisheries &amp;amp; Biodiversity&lt;/strong&gt;,

  &lt;!-- SECTION 1: GROUPED BAR CHART --&gt;

  &lt;!-- SECTION 2: RADAR CHART --&gt;
  &lt;div class=&quot;section&quot;&gt;

    &lt;div class=&quot;section-desc&quot;&gt;The radar chart shows the &lt;strong&gt;shape of suitability&lt;/strong&gt;. Varthur&#x27;s polygon (gold) is consistently larger, indicating better performance across all axes. Hesaraghatta (violet) collapses inward especially on Recreation.&lt;/div&gt;

  &lt;div class=&quot;insight-box&quot;&gt;

    &lt;div class=&quot;insight-text&quot;&gt;

    &lt;div class=&quot;insight-bullets&quot;&gt;

        &lt;div class=&quot;ib-dot&quot; style=&quot;background:var(--red)&quot;&gt;&lt;/div&gt;

        &lt;div class=&quot;ib-dot&quot; style=&quot;background:var(--accent)&quot;&gt;&lt;/div&gt;
        &lt;div class=&quot;ib-text&quot;&gt;Hesaraghatta&#x27;s &lt;strong&gt;borderline dissolved oxygen&lt;/strong&gt; limits biodiversity and fish survival.&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;ib&quot;&gt;
        &lt;div class=&quot;ib-dot&quot; style=&quot;background:var(--green)&quot;&gt;&lt;/div&gt;
        &lt;div class=&quot;ib-text&quot;&gt;&lt;strong&gt;Different pollutants dominate different use cases&lt;/strong&gt; — this is the core analytical takeaway of the entire study.&lt;/div&gt;

    &lt;div class=&quot;closing-quote&quot;&gt;
      &quot;Across all three use-specific WQIs, Varthur consistently performs better than Hesaraghatta. However, both lakes require treatment and management interventions. The results highlight that water quality is not a single concept — suitability depends strongly on intended use, and different parameters dominate different use cases.&quot;

&lt;/div&gt;

&lt;script&gt;
Chart.defaults.color = &#x27;#a8ccee&#x27;;

const GREEN = &#x27;#00e096&#x27;;

// ── CHART 1: GROUPED BAR ─────────────────────────────────────
const barCtx = document.getElementById(&#x27;barChart&#x27;).getContext(&#x27;2d&#x27;);
new Chart(barCtx, {
  type: &#x27;bar&#x27;,
  data: {
    labels: [&#x27;Fisheries &amp; Biodiversity&#x27;, &#x27;Recreation &amp; Tourism&#x27;, &#x27;Drinking-Water Source&#x27;],
    datasets: [
      {
        label: &#x27;Varthur&#x27;,
        data: [96.25, 87.40, 73.89],
        backgroundColor: &#x27;rgba(240,192,0,0.75)&#x27;,
        borderColor: VARTHUR,

}
.weight-pill {
  padding: 9px 18px; border-radius: 30px;
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 17px; font-weight: 700; letter-spacing: 0.03em;
  border: 1.5px solid;
}

/* SUB-INDEX GRID */
.subindex-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
  gap: 26px;
}
.si-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 20px; padding: 30px 30px 26px;
  position: relative; overflow: hidden;
}
.si-card::before {
  content: &#x27;&#x27;; position: absolute; top: 0; left: 0;
  width: 5px; height: 100%; border-radius: 20px 0 0 20px;
}
.si-card.coliform::before { background: #e05050; }
.si-card.turbidity::before { background: var(--orange); }
.si-card.ph::before { background: var(--accent); }
.si-card.ammonia::before { background: #70c8a0; }
.si-card.tds::before { background: var(--water); }
.si-card.nitrate::before { background: #90d040; }
.si-card.hardness::before { background: #d0a0e0; }

.si-param-name {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 28px; font-weight: 800;
  color: var(--text); margin-bottom: 4px;
}
.si-param-full { font-size: 14px; color: var(--mid); margin-bottom: 10px; line-height: 1.5; }
.si-weight-badge {
  display: inline-block; padding: 4px 12px; border-radius: 20px;
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 13px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  background: rgba(64,200,240,0.1); color: var(--accent);
  border: 1px solid rgba(64,200,240,0.3); margin-bottom: 18px;
}
.si-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.si-lake-block { margin-bottom: 4px; }
.si-lake-name {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 16px; font-weight: 700;
  color: var(--mid); margin-bottom: 8px;
  display: flex; align-items: center; gap: 8px;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.si-raw-val { font-size: 15px; color: var(--mid); margin-bottom: 8px; }
.si-raw-val strong { color: var(--text); font-size: 18px; }
.si-logic {
  font-size: 15px; color: #8ab0cc;
  line-height: 1.7; margin-bottom: 14px;
  padding: 12px 15px; background: rgba(0,0,0,0.2);
  border-radius: 10px;
}
.si-score-row {
  display: flex; align-items: baseline; gap: 6px; margin-bottom: 10px;
}
.si-score-number {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 48px; font-weight: 800; line-height: 1;
}
.si-score-label { font-size: 18px; color: var(--mid); font-weight: 500; }
.si-bar-bg {
  height: 10px; background: rgba(255,255,255,0.07);
  border-radius: 5px; overflow: hidden; margin-top: 4px;
}
.si-bar-fill {
  height: 100%; border-radius: 5px;
  width: 0%; transition: width 1.1s cubic-bezier(0.25,0.8,0.25,1);
}

/* FORMULA BANNER */
.formula-banner {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 18px; padding: 26px 32px;
  margin-bottom: 2.8rem;
}
.formula-label {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--green); margin-bottom: 12px;
}
.formula-eq {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: clamp(15px, 2.2vw, 21px); font-weight: 600;
  color: var(--mid); line-height: 1.7;
}
.formula-eq .fw { color: var(--text); font-weight: 700; }

/* CALC GRID */
.calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.calc-card {
  border-radius: 20px; padding: 32px 30px 28px;
  position: relative;
}
.calc-card.v { background: rgba(240,192,0,0.06); border: 2px solid rgba(240,192,0,0.28); }
.calc-card.h { background: rgba(184,144,240,0.06); border: 2px solid rgba(184,144,240,0.26); }
.calc-lake-name {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 18px; font-weight: 700;
  color: var(--mid); margin-bottom: 22px;
  display: flex; align-items: center; gap: 9px;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.calc-steps { display: flex; flex-direction: column; gap: 0; }
.calc-step {
  display: grid; grid-template-columns: 1fr auto auto;
  align-items: center; gap: 12px;
  padding: 14px 0; border-bottom: 1px solid var(--border);
}
.calc-step:last-child { border-bottom: none; }
.calc-step-desc { font-size: 15px; color: var(--mid); }
.param-label {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 16px; font-weight: 700; color: var(--text);
}
.calc-step-math {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 19px; font-weight: 600; white-space: nowrap;
}
.calc-step-result {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 20px; font-weight: 800; white-space: nowrap; min-width: 60px; text-align: right;
}
.calc-sum-line {
  margin-top: 22px; padding: 22px 22px 18px;
  background: rgba(0,0,0,0.25); border-radius: 14px;
  border: 1px solid var(--border);
}
.calc-sum-label {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 12px; font-weight: 700;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--green); margin-bottom: 8px;
}
.calc-sum-eq { font-size: 15px; color: var(--mid); margin-bottom: 14px; line-height: 1.6; }
.calc-final-score {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 72px; font-weight: 800; line-height: 0.9;
}
.calc-card.v .calc-final-score { color: var(--varthur); }
.calc-card.h .calc-final-score { color: var(--hesara); }

/* FOOTNOTE */
.footnote {
  margin-top: 4rem; padding: 22px 26px;
  background: rgba(64,200,240,0.04);
  border: 1px solid var(--border); border-radius: 14px;
  font-size: 14px; color: var(--mid); line-height: 1.8;
}
.footnote strong { color: var(--text); }

@media (max-width: 700px) {
  .verdict-grid, .calc-grid, .context-block { grid-template-columns: 1fr; }
  .subindex-grid { grid-template-columns: 1fr; }
}
&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;div class=&quot;container&quot;&gt;

&lt;!-- PAGE HEADER --&gt;
&lt;div class=&quot;page-header&quot;&gt;
  &lt;div class=&quot;eyebrow&quot;&gt;Water Quality Assessment · Bengaluru, Karnataka&lt;/div&gt;
  &lt;h1&gt;Potential Drinking-Water&lt;br&gt;Source WQI&lt;/h1&gt;
  &lt;p class=&quot;subtitle&quot;&gt;
    Both Varthur Lake and Hesaraghatta Reservoir are &lt;strong&gt;currently unsuitable for direct human consumption.&lt;/strong&gt;
    This index does not ask whether the water is drinkable today — it asks a more urgent question:
    &lt;strong&gt;which lake would be easier to treat into safe drinking water if Bengaluru ever needs to rely on it?&lt;/strong&gt;
    Higher scores mean less treatment effort required.
  &lt;/p&gt;

  &lt;div class=&quot;context-block&quot;&gt;
    &lt;div class=&quot;context-card bis&quot;&gt;
      &lt;div class=&quot;context-card-label&quot;&gt;Reference Standard&lt;/div&gt;
      &lt;div class=&quot;context-card-title&quot;&gt;BIS IS 10500 : 2012&lt;/div&gt;
      &lt;div class=&quot;context-card-body&quot;&gt;
        India&#x27;s national specification for drinking water. Limits used here: &lt;strong&gt;pH 6.5–8.5&lt;/strong&gt;,
        &lt;strong&gt;Turbidity ≤ 1 NTU&lt;/strong&gt; (permissible 5), &lt;strong&gt;TDS ≤ 500 mg/L&lt;/strong&gt;,
        &lt;strong&gt;Hardness ≤ 200 mg/L&lt;/strong&gt;, &lt;strong&gt;Nitrate ≤ 45 mg/L&lt;/strong&gt;,
        &lt;strong&gt;Ammonia ≤ 0.5 mg/L&lt;/strong&gt;, and &lt;strong&gt;zero detectable coliform&lt;/strong&gt; in any 100 mL sample.
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;context-card city&quot;&gt;
      &lt;div class=&quot;context-card-label&quot;&gt;Why This Matters for Bengaluru&lt;/div&gt;
      &lt;div class=&quot;context-card-title&quot;&gt;A City Under Water Stress&lt;/div&gt;
      &lt;div class=&quot;context-card-body&quot;&gt;
        Bengaluru is among India&#x27;s most water-stressed cities. Rapid construction is draining and encroaching on
        lakes that once recharged groundwater. &lt;strong&gt;The lakes that remain may need to serve as backup
        drinking-water sources in the future&lt;/strong&gt; — making it essential to understand how
        much treatment each would realistically require.
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- SECTION 01: VERDICTS --&gt;
&lt;div class=&quot;section-header&quot;&gt;
  &lt;div class=&quot;section-number&quot;&gt;01 — Final Verdicts&lt;/div&gt;
  &lt;div class=&quot;section-title&quot;&gt;Treatment Burden Assessment&lt;/div&gt;
&lt;/div&gt;

&lt;p class=&quot;section-intro&quot;&gt;
  A score of &lt;strong&gt;100 means minimal treatment effort&lt;/strong&gt; — the water is close to drinking standards.
  A score approaching &lt;strong&gt;0 means an enormous treatment burden&lt;/strong&gt; — multiple complex processes
  would be needed before the water is safe to drink. The two lakes tell very different stories.
&lt;/p&gt;

&lt;!-- SCALE BAR --&gt;
&lt;div class=&quot;scale-section&quot;&gt;
  &lt;div class=&quot;scale-bar-container&quot;&gt;
    &lt;div class=&quot;scale-bar-title&quot;&gt;Treatment Burden Scale — Where Do the Lakes Land?&lt;/div&gt;
    &lt;div style=&quot;position: relative; margin-bottom: 42px; margin-top: 36px;&quot;&gt;
      &lt;div class=&quot;scale-track&quot;&gt;
        &lt;!-- Varthur at 73.89 --&gt;
        &lt;div class=&quot;scale-dot-v&quot; style=&quot;left: 73.89%&quot;&gt;V&lt;/div&gt;
        &lt;!-- Hesaraghatta at 45.44 --&gt;
        &lt;div class=&quot;scale-dot-h&quot; style=&quot;left: 45.44%&quot;&gt;H&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;scale-labels&quot;&gt;
        &lt;span&gt;0 — Very High Burden&lt;/span&gt;
        &lt;span&gt;40&lt;/span&gt;
        &lt;span&gt;60&lt;/span&gt;
        &lt;span&gt;80&lt;/span&gt;
        &lt;span&gt;100 — Low Burden&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;scale-legend&quot;&gt;
      &lt;div class=&quot;scale-legend-item&quot;&gt;&lt;div class=&quot;scale-legend-dot&quot; style=&quot;background:var(--varthur)&quot;&gt;&lt;/div&gt; Varthur Lake — 73.89 (Moderate Treatment Burden)&lt;/div&gt;
      &lt;div class=&quot;scale-legend-item&quot;&gt;&lt;div class=&quot;scale-legend-dot&quot; style=&quot;background:var(--hesara)&quot;&gt;&lt;/div&gt; Hesaraghatta Reservoir — 45.44 (High Treatment Burden)&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;verdict-grid&quot; style=&quot;margin-bottom: 3rem;&quot;&gt;

  &lt;div class=&quot;verdict-card v&quot;&gt;
    &lt;div class=&quot;verdict-lake-label&quot;&gt;&lt;span class=&quot;dot dot-v&quot;&gt;&lt;/span&gt;Varthur Lake&lt;/div&gt;
    &lt;div class=&quot;verdict-score&quot;&gt;73.89&lt;/div&gt;
    &lt;div class=&quot;verdict-label&quot;&gt;Moderate Treatment Burden&lt;/div&gt;
    &lt;span class=&quot;verdict-badge badge-moderate&quot;&gt;More Feasible Backup Source&lt;/span&gt;
    &lt;p class=&quot;verdict-desc&quot;&gt;
      Not drinkable as-is, but comparatively &lt;strong&gt;the better candidate&lt;/strong&gt; for conversion to a potable
      backup source. Its microbial contamination, pH, ammonia, and nitrate profile are more
      favourable than Hesaraghatta&#x27;s — despite its higher turbidity being a notable concern.
    &lt;/p&gt;
    &lt;div class=&quot;verdict-strengths&quot;&gt;
      &lt;strong&gt;Key advantages:&lt;/strong&gt; pH within BIS range · Very low nitrate · Lower coliform load · Lower ammonia
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;verdict-card h&quot;&gt;
    &lt;div class=&quot;verdict-lake-label&quot;&gt;&lt;span class=&quot;dot dot-h&quot;&gt;&lt;/span&gt;Hesaraghatta Reservoir&lt;/div&gt;
    &lt;div class=&quot;verdict-score&quot;&gt;45.44&lt;/div&gt;
    &lt;div class=&quot;verdict-label&quot;&gt;High Treatment Burden&lt;/div&gt;
    &lt;span class=&quot;verdict-badge badge-high&quot;&gt;Less Feasible Backup Source&lt;/span&gt;
    &lt;p class=&quot;verdict-desc&quot;&gt;
      Also unsuitable without treatment, but would require &lt;strong&gt;substantially more effort&lt;/strong&gt; to
      convert. Extremely high coliform contamination and pH well outside the BIS range are the primary
      drivers of its lower score — a much heavier disinfection and chemical correction load.
    &lt;/p&gt;
    &lt;div class=&quot;verdict-strengths&quot;&gt;
      &lt;strong&gt;Relative advantages:&lt;/strong&gt; Lower turbidity · Much lower TDS · TDS within BIS acceptable limit
    &lt;/div&gt;
  &lt;/div&gt;

&lt;/div&gt;

&lt;hr class=&quot;section-divider&quot;&gt;

&lt;!-- SECTION 02: SUB-INDICES --&gt;
&lt;div class=&quot;section-header&quot;&gt;
  &lt;div class=&quot;section-number&quot;&gt;02 — Sub-Index Calculations&lt;/div&gt;
  &lt;div class=&quot;section-title&quot;&gt;Seven Parameters, Scored Out of 100&lt;/div&gt;
&lt;/div&gt;

&lt;p class=&quot;section-intro&quot;&gt;
  Each parameter is converted into a score from 0 to 100, where &lt;strong&gt;100 = closest to the BIS drinking-water standard&lt;/strong&gt;
  and &lt;strong&gt;0 = farthest from it&lt;/strong&gt;. Parameters are weighted differently because they don&#x27;t all pose the same
  challenge to a water treatment plant. Coliform and turbidity carry the highest weights because
  they represent the biggest physical burdens in raw surface water treatment.
&lt;/p&gt;

&lt;div class=&quot;weight-pills&quot; style=&quot;margin-bottom: 3rem;&quot;&gt;
  &lt;div class=&quot;weight-pill&quot; style=&quot;background:rgba(224,80,80,0.12);color:#e05050;border-color:rgba(224,80,80,0.35)&quot;&gt;Coliform · 30%&lt;/div&gt;
  &lt;div class=&quot;weight-pill&quot; style=&quot;background:rgba(255,140,66,0.12);color:var(--orange);border-color:rgba(255,140,66,0.35)&quot;&gt;Turbidity · 20%&lt;/div&gt;
  &lt;div class=&quot;weight-pill&quot; style=&quot;background:rgba(64,200,240,0.1);color:var(--accent);border-color:rgba(64,200,240,0.3)&quot;&gt;pH · 15%&lt;/div&gt;
  &lt;div class=&quot;weight-pill&quot; style=&quot;background:rgba(112,200,160,0.12);color:#70c8a0;border-color:rgba(112,200,160,0.35)&quot;&gt;Ammonia · 15%&lt;/div&gt;
  &lt;div class=&quot;weight-pill&quot; style=&quot;background:rgba(32,144,208,0.12);color:var(--water);border-color:rgba(32,144,208,0.35)&quot;&gt;TDS · 10%&lt;/div&gt;
  &lt;div class=&quot;weight-pill&quot; style=&quot;background:rgba(144,208,64,0.12);color:#90d040;border-color:rgba(144,208,64,0.35)&quot;&gt;Nitrate · 5%&lt;/div&gt;
  &lt;div class=&quot;weight-pill&quot; style=&quot;background:rgba(208,160,224,0.12);color:#d0a0e0;border-color:rgba(208,160,224,0.35)&quot;&gt;Hardness · 5%&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;subindex-grid&quot;&gt;

  &lt;!-- COLIFORM --&gt;
  &lt;div class=&quot;si-card coliform&quot;&gt;
    &lt;div class=&quot;si-param-name&quot;&gt;Total Coliform&lt;/div&gt;
    &lt;div class=&quot;si-param-full&quot;&gt;Higher is worse · BIS: zero detectable in any 100 mL sample · Practical scale: 0 CFU = 100, 1500 CFU = 0&lt;/div&gt;
    &lt;div class=&quot;si-weight-badge&quot;&gt;Weight 30 %&lt;/div&gt;
    &lt;hr class=&quot;si-divider&quot;&gt;

    &lt;div class=&quot;si-lake-block&quot;&gt;
      &lt;div class=&quot;si-lake-name&quot;&gt;&lt;span class=&quot;dot dot-v&quot;&gt;&lt;/span&gt;Varthur Lake&lt;/div&gt;
      &lt;div class=&quot;si-raw-val&quot;&gt;Measured: &lt;strong&gt;132 CFU / 100 mL&lt;/strong&gt;&lt;/div&gt;
      &lt;div class=&quot;si-logic&quot;&gt;
        Between 100 and 500 CFU. Score drops linearly from 80 → 40 in this band.&lt;br&gt;
        SI = 80 − ((132 − 100) / 400 × 40) = 80 − (32/400 × 40) = 80 − 3.2
      &lt;/div&gt;
      &lt;div class=&quot;si-score-row&quot;&gt;
        &lt;div class=&quot;si-score-number&quot; style=&quot;color:#e05050&quot;&gt;76.80&lt;/div&gt;
        &lt;div class=&quot;si-score-label&quot;&gt;/ 100&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;si-bar-bg&quot;&gt;&lt;div class=&quot;si-bar-fill&quot; style=&quot;background:#e05050&quot; data-w=&quot;76.8&quot;&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;hr class=&quot;si-divider&quot;&gt;

    &lt;div class=&quot;si-lake-block&quot;&gt;
      &lt;div class=&quot;si-lake-name&quot;&gt;&lt;span class=&quot;dot dot-h&quot;&gt;&lt;/span&gt;Hesaraghatta Reservoir&lt;/div&gt;
      &lt;div class=&quot;si-raw-val&quot;&gt;Measured: &lt;strong&gt;1,450 CFU / 100 mL&lt;/strong&gt;&lt;/div&gt;
      &lt;div class=&quot;si-logic&quot;&gt;
        Between 500 and 1500 CFU. Score drops linearly from 40 → 0 in this band.&lt;br&gt;
        SI = 40 − ((1450 − 500) / 1000 × 40) = 40 − (950/1000 × 40) = 40 − 38
      &lt;/div&gt;
      &lt;div class=&quot;si-score-row&quot;&gt;
        &lt;div class=&quot;si-score-number&quot; style=&quot;color:var(--hesara)&quot;&gt;2.00&lt;/div&gt;
        &lt;div class=&quot;si-score-label&quot;&gt;/ 100&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;si-bar-bg&quot;&gt;&lt;div class=&quot;si-bar-fill&quot; style=&quot;background:var(--hesara)&quot; data-w=&quot;2&quot;&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- TURBIDITY --&gt;
  &lt;div class=&quot;si-card turbidity&quot;&gt;
    &lt;div class=&quot;si-param-name&quot;&gt;Turbidity&lt;/div&gt;
    &lt;div class=&quot;si-param-full&quot;&gt;Higher is worse · BIS: ≤ 1 NTU acceptable, ≤ 5 NTU permissible · Zero score at 15 NTU&lt;/div&gt;
    &lt;div class=&quot;si-weight-badge&quot;&gt;Weight 20 %&lt;/div&gt;
    &lt;hr class=&quot;si-divider&quot;&gt;

    &lt;div class=&quot;si-lake-block&quot;&gt;
      &lt;div class=&quot;si-lake-name&quot;&gt;&lt;span class=&quot;dot dot-v&quot;&gt;&lt;/span&gt;Varthur Lake&lt;/div&gt;
      &lt;div class=&quot;si-raw-val&quot;&gt;Measured: &lt;strong&gt;9 NTU&lt;/strong&gt;&lt;/div&gt;
      &lt;div class=&quot;si-logic&quot;&gt;
        Between 5 and 10 NTU. Score drops from 60 → 20 in this range.&lt;br&gt;
        SI = 60 − ((9 − 5) / 5 × 40) = 60 − (4/5 × 40) = 60 − 32
      &lt;/div&gt;
      &lt;div class=&quot;si-score-row&quot;&gt;
        &lt;div class=&quot;si-score-number&quot; style=&quot;color:var(--orange)&quot;&gt;28.00&lt;/div&gt;
        &lt;div class=&quot;si-score-label&quot;&gt;/ 100&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;si-bar-bg&quot;&gt;&lt;div class=&quot;si-bar-fill&quot; style=&quot;background:var(--orange)&quot; data-w=&quot;28&quot;&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

    &lt;hr class=&quot;si-divider&quot;&gt;

    &lt;div class=&quot;si-lake-block&quot;&gt;
      &lt;div class=&quot;si-lake-name&quot;&gt;&lt;span class=&quot;dot dot-h&quot;&gt;&lt;/span&gt;Hesaraghatta Reservoir&lt;/div&gt;
      &lt;div class=&quot;si-raw-val&quot;&gt;Measured: &lt;strong&gt;5.46 NTU&lt;/strong&gt;&lt;/div&gt;
      &lt;div class=&quot;si-logic&quot;&gt;
        Just above the 5 NTU permissible limit — minor penalty only.&lt;br&gt;
        SI = 60 − ((5.46 − 5) / 5 × 40) = 60 − (0.46/5 × 40) = 60 − 3.68
      &lt;/div&gt;
      &lt;div class=&quot;si-score-row&quot;&gt;
        &lt;div class=&quot;si-score-number&quot; style=&quot;color:var(--hesara)&quot;&gt;56.32&lt;/div&gt;
        &lt;div class=&quot;si-score-label&quot;&gt;/ 100&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;si-bar-bg&quot;&gt;&lt;div class=&quot;si-bar-fill&quot; style=&quot;background:var(--hesara)&quot; data-w=&quot;56.32&quot;&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- pH --&gt;
  &lt;div class=&quot;si-card ph&quot;&gt;
    &lt;div class=&quot;si-param-name&quot;&gt;pH&lt;/div&gt;
    &lt;div class=&quot;si-param-full&quot;&gt;Best within a range · BIS: 6.5 – 8.5 (no relaxation) · Zero score at pH 4.5 or 10.5&lt;/div&gt;
    &lt;div class=&quot;si-weight-badge&quot;&gt;Weight 15 %&lt;/div&gt;
    &lt;hr class=&quot;si-divider&quot;&gt;

    &lt;div class=&quot;si-lake-block&quot;&gt;
      &lt;div class=&quot;si-lake-name&quot;&gt;&lt;span class=&quot;dot dot-v&quot;&gt;&lt;/span&gt;Varthur Lake&lt;/div&gt;
      &lt;div class=&quot;si-raw-val&quot;&gt;Measured: &lt;strong&gt;pH 8.08&lt;/strong&gt;&lt;/div&gt;

  &lt;h1&gt;Fisheries &amp;amp; Biodiversity&lt;br&gt;Water Quality Index&lt;/h1&gt;
  &lt;div class=&quot;subtitle&quot;&gt;
    The WQI here is benchmarked against &lt;strong style=&quot;color:var(--d-orange)&quot;&gt;Class D&lt;/strong&gt; of the BIS IS 2296:1992 surface water standards — the class designated for the propagation of wildlife and fisheries. Class D specifies four parameters: pH, Dissolved Oxygen (DO), Free Ammonia (as N), and BOD. Since BOD was not measured at either site, it has been omitted from the calculation. The WQI is therefore derived from the three remaining Class D parameters — pH, DO, and Free Ammonia — each of which was directly observed and maps cleanly onto the Class D criteria.

&lt;!-- SECTION 3: SUB-INDEX CALCULATIONS --&gt;
&lt;div class=&quot;section-header&quot;&gt;
  &lt;div class=&quot;section-number&quot;&gt;03 — Sub-Index Calculations&lt;/div&gt;
  &lt;div class=&quot;section-title&quot;&gt;How Each Parameter Was Scored (0 – 100)&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;section-intro&quot;&gt;
  Each raw measurement is converted into a score between 0 and 100 — the sub-index. The direction of scoring differs by parameter type: pH must stay within a range, DO rewards higher values, and ammonia penalises higher values. All three are then combined using weights proportional to their ecological importance in Class D.
&lt;/div&gt;

&lt;div class=&quot;subindex-grid&quot;&gt;

  &lt;!-- pH --&gt;
  &lt;div class=&quot;si-card ph&quot;&gt;
    &lt;div class=&quot;si-param-name&quot;&gt;pH&lt;/div&gt;
    &lt;div class=&quot;si-param-full&quot;&gt;Must stay within range 6.5 – 8.5&lt;/div&gt;
    &lt;div class=&quot;si-weight-badge&quot;&gt;Weight 30%&lt;/div&gt;
    &lt;hr class=&quot;si-divider&quot;&gt;
    &lt;div class=&quot;si-lake-block&quot;&gt;
      &lt;div class=&quot;si-lake-name&quot;&gt;&lt;span class=&quot;dot dot-v&quot;&gt;&lt;/span&gt;Varthur Lake&lt;/div&gt;
      &lt;div class=&quot;si-raw-val&quot;&gt;Measured: &lt;strong&gt;8.08&lt;/strong&gt;&lt;/div&gt;
      &lt;div class=&quot;si-logic&quot;&gt;8.08 is inside the 6.5–8.5 range → full score&lt;/div&gt;
      &lt;div class=&quot;si-score-row&quot;&gt;
        &lt;div class=&quot;si-score-number&quot; style=&quot;color:var(--varthur)&quot;&gt;100&lt;/div&gt;
        &lt;div class=&quot;si-score-label&quot;&gt;/ 100&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;si-bar-bg&quot;&gt;&lt;div class=&quot;si-bar-fill&quot; style=&quot;width:0%;background:var(--varthur)&quot; data-w=&quot;100&quot;&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;hr class=&quot;si-divider&quot;&gt;
    &lt;div class=&quot;si-lake-block&quot;&gt;
      &lt;div class=&quot;si-lake-name&quot;&gt;&lt;span class=&quot;dot dot-h&quot;&gt;&lt;/span&gt;Hesaraghatta&lt;/div&gt;
      &lt;div class=&quot;si-raw-val&quot;&gt;Measured: &lt;strong&gt;9.34&lt;/strong&gt;&lt;/div&gt;
      &lt;div class=&quot;si-logic&quot;&gt;9.34 exceeds upper limit of 8.5 by 0.84 units → score penalised&lt;/div&gt;
      &lt;div class=&quot;si-score-row&quot;&gt;
        &lt;div class=&quot;si-score-number&quot; style=&quot;color:var(--hesara)&quot;&gt;58&lt;/div&gt;
        &lt;div class=&quot;si-score-label&quot;&gt;/ 100&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;si-bar-bg&quot;&gt;&lt;div class=&quot;si-bar-fill&quot; style=&quot;width:0%;background:var(--hesara)&quot; data-w=&quot;58&quot;&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- DO --&gt;
  &lt;div class=&quot;si-card do&quot;&gt;
    &lt;div class=&quot;si-param-name&quot;&gt;DO&lt;/div&gt;
    &lt;div class=&quot;si-param-full&quot;&gt;Higher is better · Class D minimum ≥ 4 mg/L&lt;/div&gt;
    &lt;div class=&quot;si-weight-badge&quot;&gt;Weight 40%&lt;/div&gt;
    &lt;hr class=&quot;si-divider&quot;&gt;
    &lt;div class=&quot;si-lake-block&quot;&gt;
      &lt;div class=&quot;si-lake-name&quot;&gt;&lt;span class=&quot;dot dot-v&quot;&gt;&lt;/span&gt;Varthur Lake&lt;/div&gt;
      &lt;div class=&quot;si-raw-val&quot;&gt;Measured: &lt;strong&gt;6.24 mg/L&lt;/strong&gt;&lt;/div&gt;
      &lt;div class=&quot;si-logic&quot;&gt;≥ 6 mg/L = fully saturated, excellent for fish → full score&lt;/div&gt;
      &lt;div class=&quot;si-score-row&quot;&gt;
        &lt;div class=&quot;si-score-number&quot; style=&quot;color:var(--varthur)&quot;&gt;100&lt;/div&gt;
        &lt;div class=&quot;si-score-label&quot;&gt;/ 100&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;si-bar-bg&quot;&gt;&lt;div class=&quot;si-bar-fill&quot; style=&quot;width:0%;background:var(--varthur)&quot; data-w=&quot;100&quot;&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;hr class=&quot;si-divider&quot;&gt;
    &lt;div class=&quot;si-lake-block&quot;&gt;
      &lt;div class=&quot;si-lake-name&quot;&gt;&lt;span class=&quot;dot dot-h&quot;&gt;&lt;/span&gt;Hesaraghatta&lt;/div&gt;

      &lt;div class=&quot;si-logic&quot;&gt;Just above the 4 mg/L minimum; scaled 0–100 between dead water (0) and saturation (≥ 6)&lt;/div&gt;
      &lt;div class=&quot;si-score-row&quot;&gt;
        &lt;div class=&quot;si-score-number&quot; style=&quot;color:var(--hesara)&quot;&gt;66.8&lt;/div&gt;
        &lt;div class=&quot;si-score-label&quot;&gt;/ 100&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;si-bar-bg&quot;&gt;&lt;div class=&quot;si-bar-fill&quot; style=&quot;width:0%;background:var(--hesara)&quot; data-w=&quot;66.8&quot;&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- Ammonia --&gt;
  &lt;div class=&quot;si-card nh3&quot;&gt;
    &lt;div class=&quot;si-param-name&quot;&gt;NH₃&lt;/div&gt;
    &lt;div class=&quot;si-param-full&quot;&gt;Higher is worse · Class D max ≤ 1.2 mg/L&lt;/div&gt;
    &lt;div class=&quot;si-weight-badge&quot;&gt;Weight 30%&lt;/div&gt;
    &lt;hr class=&quot;si-divider&quot;&gt;
    &lt;div class=&quot;si-lake-block&quot;&gt;
      &lt;div class=&quot;si-lake-name&quot;&gt;&lt;span class=&quot;dot dot-v&quot;&gt;&lt;/span&gt;Varthur Lake&lt;/div&gt;
      &lt;div class=&quot;si-raw-val&quot;&gt;Measured: &lt;strong&gt;0.15 mg/L&lt;/strong&gt;&lt;/div&gt;
      &lt;div class=&quot;si-logic&quot;&gt;Very low — well below limit. Score = (1 − 0.15 / 1.2) × 100&lt;/div&gt;

      &lt;/div&gt;
      &lt;div class=&quot;si-bar-bg&quot;&gt;&lt;div class=&quot;si-bar-fill&quot; style=&quot;width:0%;background:var(--varthur)&quot; data-w=&quot;87.5&quot;&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;hr class=&quot;si-divider&quot;&gt;
    &lt;div class=&quot;si-lake-block&quot;&gt;
      &lt;div class=&quot;si-lake-name&quot;&gt;&lt;span class=&quot;dot dot-h&quot;&gt;&lt;/span&gt;Hesaraghatta&lt;/div&gt;
      &lt;div class=&quot;si-raw-val&quot;&gt;Measured: &lt;strong&gt;0.25 mg/L&lt;/strong&gt;&lt;/div&gt;
      &lt;div class=&quot;si-logic&quot;&gt;Within limit but higher → lower score. Score = (1 − 0.25 / 1.2) × 100&lt;/div&gt;
      &lt;div class=&quot;si-score-row&quot;&gt;
        &lt;div class=&quot;si-score-number&quot; style=&quot;color:var(--hesara)&quot;&gt;79.2&lt;/div&gt;
        &lt;div class=&quot;si-score-label&quot;&gt;/ 100&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;si-bar-bg&quot;&gt;&lt;div class=&quot;si-bar-fill&quot; style=&quot;width:0%;background:var(--hesara)&quot; data-w=&quot;79.2&quot;&gt;&lt;/div&gt;&lt;/div&gt;
    &lt;/div&gt;

&lt;/div&gt;

&lt;hr class=&quot;section-divider&quot;&gt;

&lt;!-- SECTION 4: FINAL WQI CALCULATION --&gt;
&lt;div class=&quot;section-header&quot;&gt;
  &lt;div class=&quot;section-number&quot;&gt;04 — Final WQI Calculation&lt;/div&gt;
  &lt;div class=&quot;section-title&quot;&gt;Weighted Average of Sub-Indices&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;formula-banner&quot;&gt;
  &lt;div class=&quot;formula-label&quot;&gt;Formula&lt;/div&gt;
  &lt;div class=&quot;formula-eq&quot;&gt;
    WQI = (&lt;span class=&quot;fw&quot;&gt;pH&lt;/span&gt; × 0.30) + (&lt;span class=&quot;fw&quot;&gt;DO&lt;/span&gt; × 0.40) + (&lt;span class=&quot;fw&quot;&gt;NH₃&lt;/span&gt; × 0.30)
  &lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;calc-grid&quot;&gt;

  &lt;div class=&quot;calc-card v&quot;&gt;
    &lt;div class=&quot;calc-lake-name&quot;&gt;&lt;span class=&quot;dot dot-v&quot;&gt;&lt;/span&gt;Varthur Lake&lt;/div&gt;
    &lt;div class=&quot;calc-steps&quot;&gt;
      &lt;div class=&quot;calc-step&quot;&gt;
        &lt;div class=&quot;calc-step-desc&quot;&gt;&lt;span class=&quot;param-label&quot;&gt;pH&lt;/span&gt; sub-index × weight&lt;/div&gt;
        &lt;div class=&quot;calc-step-math&quot; style=&quot;color:var(--water)&quot;&gt;100 × 0.30&lt;/div&gt;
        &lt;div class=&quot;calc-step-result&quot; style=&quot;color:var(--varthur)&quot;&gt;=&amp;nbsp;30.00&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;calc-step&quot;&gt;
        &lt;div class=&quot;calc-step-desc&quot;&gt;&lt;span class=&quot;param-label&quot;&gt;DO&lt;/span&gt; sub-index × weight&lt;/div&gt;
        &lt;div class=&quot;calc-step-math&quot; style=&quot;color:var(--accent)&quot;&gt;100 × 0.40&lt;/div&gt;
        &lt;div class=&quot;calc-step-result&quot; style=&quot;color:var(--varthur)&quot;&gt;=&amp;nbsp;40.00&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;calc-step&quot;&gt;
        &lt;div class=&quot;calc-step-desc&quot;&gt;&lt;span class=&quot;param-label&quot;&gt;NH₃&lt;/span&gt; sub-index × weight&lt;/div&gt;
        &lt;div class=&quot;calc-step-math&quot; style=&quot;color:#d07840&quot;&gt;87.5 × 0.30&lt;/div&gt;
        &lt;div class=&quot;calc-step-result&quot; style=&quot;color:var(--varthur)&quot;&gt;=&amp;nbsp;26.25&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;calc-sum-line&quot;&gt;
      &lt;div class=&quot;calc-sum-label&quot;&gt;Final WQI&lt;/div&gt;
      &lt;div class=&quot;calc-sum-eq&quot;&gt;30.00 + 40.00 + 26.25&lt;/div&gt;
      &lt;div class=&quot;calc-final-score&quot;&gt;96.25&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;calc-card h&quot;&gt;
    &lt;div class=&quot;calc-lake-name&quot;&gt;&lt;span class=&quot;dot dot-h&quot;&gt;&lt;/span&gt;Hesaraghatta Reservoir&lt;/div&gt;
    &lt;div class=&quot;calc-steps&quot;&gt;
      &lt;div class=&quot;calc-step&quot;&gt;
        &lt;div class=&quot;calc-step-desc&quot;&gt;&lt;span class=&quot;param-label&quot;&gt;pH&lt;/span&gt; sub-index × weight&lt;/div&gt;
        &lt;div class=&quot;calc-step-math&quot; style=&quot;color:var(--water)&quot;&gt;58 × 0.30&lt;/div&gt;
        &lt;div class=&quot;calc-step-result&quot; style=&quot;color:var(--hesara)&quot;&gt;=&amp;nbsp;17.40&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;calc-step&quot;&gt;
        &lt;div class=&quot;calc-step-desc&quot;&gt;&lt;span class=&quot;param-label&quot;&gt;DO&lt;/span&gt; sub-index × weight&lt;/div&gt;
        &lt;div class=&quot;calc-step-math&quot; style=&quot;color:var(--accent)&quot;&gt;66.8 × 0.40&lt;/div&gt;
        &lt;div class=&quot;calc-step-result&quot; style=&quot;color:var(--hesara)&quot;&gt;=&amp;nbsp;26.72&lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;calc-step&quot;&gt;
        &lt;div class=&quot;calc-step-desc&quot;&gt;&lt;span class=&quot;param-label&quot;&gt;NH₃&lt;/span&gt; sub-index × weight&lt;/div&gt;
        &lt;div class=&quot;calc-step-math&quot; style=&quot;color:#d07840&quot;&gt;79.2 × 0.30&lt;/div&gt;
        &lt;div class=&quot;calc-step-result&quot; style=&quot;color:var(--hesara)&quot;&gt;=&amp;nbsp;23.76&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;calc-sum-line&quot;&gt;
      &lt;div class=&quot;calc-sum-label&quot;&gt;Final WQI&lt;/div&gt;
      &lt;div class=&quot;calc-sum-eq&quot;&gt;17.40 + 26.72 + 23.76&lt;/div&gt;
      &lt;div class=&quot;calc-final-score&quot;&gt;67.88&lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

&lt;/div&gt;

&lt;div class=&quot;footnote&quot;&gt;
  Reference: BIS IS 2296:1992 — Designated Best Use Class D (Propagation of Wildlife and Fisheries). Source: Central Pollution Control Board. Weights assigned: DO 40%, pH 30%, Free Ammonia 30%, reflecting the primary importance of dissolved oxygen for aquatic metabolism and the constraint role of pH and ammonia toxicity. BOD (Class D limit: ≤ 6 mg/L, 5-day at 20°C) was not measured at either site and is excluded from this index.

  --surface2: #0e2038;
  --border: rgba(100,200,255,0.13);
  --text: #ddeeff;
  --mid: #a8ccee;
  --varthur: #f0c000;
  --hesara: #b890f0;
  --accent: #40c8f0;
  --water: #2090d0;
  --fail: #e05050;
  --b-teal: #00c9a7;
  --b-teal-dim: rgba(0,201,167,0.15);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: &#x27;Barlow&#x27;, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 4rem 2.5rem 7rem;
}
.container { max-width: 1100px; margin: 0 auto; }

/* PAGE HEADER */
.page-header {
  margin-bottom: 4.5rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 2.5rem;
}
.page-header .eyebrow {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 14px; font-weight: 600;
  letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--b-teal); margin-bottom: 14px;
}
.page-header h1 {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: clamp(42px, 6vw, 74px); font-weight: 800;
  line-height: 1.0; letter-spacing: 0.02em; color: var(--text);
}
.page-header .subtitle {
  font-size: 17px; font-weight: 400;
  color: var(--mid); margin-top: 18px;
  max-width: 800px; line-height: 1.75;
}

/* SECTION HEADERS */
.section-header { margin-bottom: 2rem; }
.section-number {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 14px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--b-teal); margin-bottom: 4px;
}
.section-title {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: clamp(26px, 4vw, 40px); font-weight: 700;
  color: var(--text); letter-spacing: 0.02em;
}
.section-divider {
  border: none; border-top: 1px solid var(--border); margin: 4.5rem 0;
}
.section-intro {
  font-size: 16px; color: var(--mid);
  line-height: 1.75; margin-bottom: 2.5rem; max-width: 820px;
}

/* CLASS B REFERENCE SECTION */
.class-b-wrapper {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 28px; align-items: start;
}
.class-b-card {
  background: rgba(0,201,167,0.07);
  border: 2px solid rgba(0,201,167,0.35);
  border-radius: 20px; padding: 36px 32px 32px;
  position: relative; overflow: hidden;
}
.class-b-card::before {
  content: &#x27;&#x27;; position: absolute; top: 0; left: 0; right: 0;
  height: 5px; background: var(--b-teal); border-radius: 20px 20px 0 0;
}
.class-b-badge {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 88px; font-weight: 800;
  color: var(--b-teal); line-height: 1; margin-bottom: 6px;
}
.class-b-title {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 24px; font-weight: 700;
  color: var(--text); margin-bottom: 22px; line-height: 1.25;
}
.class-b-params { display: flex; flex-direction: column; gap: 10px; }
.class-b-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding-bottom: 9px; border-bottom: 1px solid rgba(100,200,255,0.1);
}
.class-b-row:last-child { border-bottom: none; }
.class-b-param-name { font-size: 15px; color: var(--mid); font-weight: 400; }
.class-b-param-val {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 20px; font-weight: 700; color: var(--text);
}
.class-b-param-val.omitted {
  color: var(--fail); text-decoration: line-through; opacity: 0.65;
}
.omit-tag {
  font-size: 12px; font-weight: 600;
  background: rgba(224,80,80,0.15); color: var(--fail);
  border: 1px solid rgba(224,80,80,0.35);
  border-radius: 20px; padding: 2px 9px; margin-left: 8px;
  vertical-align: middle; letter-spacing: 0.05em; text-transform: uppercase;
}
.class-b-note {
  margin-top: 20px; padding: 15px 17px;
  background: rgba(64,200,240,0.06); border-radius: 10px;
  border-left: 3px solid var(--b-teal);
  font-size: 14px; color: var(--mid); line-height: 1.65;
}
.class-b-note strong { color: var(--b-teal); }

/* RECREATION ILLUSTRATION */
.rec-illustration {
  border: 1px solid rgba(0,201,167,0.2);
  border-radius: 20px; overflow: hidden; position: relative;
}
.rec-caption {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 14px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--b-teal); text-align: center;
  padding: 14px 0 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
}
.rec-caption-sub {
  font-size: 13px; color: var(--mid);
  display: block; margin-top: 2px;
  font-family: &#x27;Barlow&#x27;, sans-serif;
  font-weight: 400; text-transform: none; letter-spacing: 0;
}

/* VERDICT CARDS */
.verdict-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.verdict-card { border-radius: 20px; padding: 42px 36px 36px; }
.verdict-card.v { background: rgba(240,192,0,0.07); border: 2px solid rgba(240,192,0,0.32); }
.verdict-card.h { background: rgba(184,144,240,0.07); border: 2px solid rgba(184,144,240,0.3); }
.verdict-lake-label {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 15px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--mid); margin-bottom: 14px;
  display: flex; align-items: center; gap: 9px;
}
.dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.dot-v { background: var(--varthur); }
.dot-h { background: var(--hesara); }
.verdict-score {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: clamp(88px, 11vw, 128px); font-weight: 800;
  line-height: 0.85; margin-bottom: 14px; letter-spacing: -0.01em;
}
.verdict-card.v .verdict-score { color: var(--varthur); }
.verdict-card.h .verdict-score { color: var(--hesara); }
.verdict-label {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 22px; font-weight: 700; margin-bottom: 10px;
}
.verdict-card.v .verdict-label { color: #d4b840; }
.verdict-card.h .verdict-label { color: #c8a8f8; }
.verdict-status-badge {
  display: inline-block; padding: 5px 14px; border-radius: 20px;
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 14px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 18px;
}
.badge-suitable   { background: rgba(0,201,167,0.14); color: var(--b-teal);  border: 1px solid rgba(0,201,167,0.35); }
.badge-restricted { background: rgba(184,144,240,0.14); color: #c8a8f8; border: 1px solid rgba(184,144,240,0.35); }
.verdict-desc { font-size: 16px; color: var(--mid); line-height: 1.75; margin-bottom: 18px; }
.verdict-formula-mini {
  padding: 15px 17px; background: rgba(64,200,240,0.06); border-radius: 10px;
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif; font-size: 19px;
  color: var(--mid); line-height: 2.0;
}
.verdict-formula-mini .fval { font-weight: 700; color: var(--text); font-size: 22px; }
.verdict-formula-mini .feq  { color: var(--b-teal); font-weight: 700; font-size: 24px; }

/* WEIGHT PILL */
.weight-summary {
  margin-bottom: 2.5rem;
  display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
}
.weight-pill {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 40px; padding: 10px 20px;
}
.weight-pill-param {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 18px; font-weight: 700; color: var(--text);
}
.weight-pill-pct {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 22px; font-weight: 800;
}
.weight-pill-pct.c { color: #e05050; }
.weight-pill-pct.p { color: var(--water); }
.weight-pill-pct.d { color: var(--accent); }
.weight-pill-pct.t { color: #f0a030; }
.weight-plus {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 24px; font-weight: 300; color: var(--mid); align-self: center;
}

/* SUB-INDEX CARDS – 4 PARAMS */
.subindex-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
.si-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 18px; padding: 32px 28px 28px;
  position: relative; overflow: hidden;
}
.si-card::before {
  content: &#x27;&#x27;; position: absolute; top: 0; left: 0; right: 0;
  height: 4px; border-radius: 18px 18px 0 0;
}
.si-card.coli::before  { background: #e05050; }
.si-card.ph::before    { background: var(--water); }
.si-card.do_::before   { background: var(--accent); }
.si-card.turb::before  { background: #f0a030; }

.si-param-name {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 36px; font-weight: 800; color: var(--text); margin-bottom: 3px;
}
.si-param-full {
  font-size: 14px; color: var(--mid); margin-bottom: 12px; line-height: 1.5;
}
.si-weight-badge {
  display: inline-block; padding: 3px 12px;
  border-radius: 20px; font-size: 13px; font-weight: 600;
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 20px;
}
.si-card.coli .si-weight-badge { background: rgba(224,80,80,0.13); color: #e05050; border: 1px solid rgba(224,80,80,0.3); }
.si-card.ph   .si-weight-badge { background: rgba(32,144,208,0.13); color: var(--water); border: 1px solid rgba(32,144,208,0.3); }
.si-card.do_  .si-weight-badge { background: rgba(64,200,240,0.13); color: var(--accent); border: 1px solid rgba(64,200,240,0.3); }
.si-card.turb .si-weight-badge { background: rgba(240,160,48,0.13); color: #f0a030; border: 1px solid rgba(240,160,48,0.3); }

.si-divider {
  border: none; border-top: 1px solid var(--border); margin: 16px 0;
}
.si-lake-block { margin-bottom: 6px; }
.si-lake-name {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 17px; font-weight: 600; color: var(--mid);
  display: flex; align-items: center; gap: 8px; margin-bottom: 5px;
}
.si-raw-val { font-size: 15px; color: var(--mid); margin-bottom: 5px; }
.si-raw-val strong { color: var(--text); font-size: 17px; }
.si-logic {
  font-size: 14px; color: #7aa0c0; line-height: 1.55; margin-bottom: 10px;
  background: rgba(64,200,240,0.04); border-radius: 8px; padding: 8px 12px;
}
.si-score-row {
  display: flex; align-items: baseline; gap: 6px; margin-bottom: 8px;
}
.si-score-number {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 52px; font-weight: 800; line-height: 1;
}
.si-score-label {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 20px; font-weight: 400; color: var(--mid);
}
.si-bar-bg {
  height: 8px; background: rgba(100,180,255,0.1);
  border-radius: 4px; overflow: hidden;
}
.si-bar-fill {
  height: 100%; border-radius: 4px; width: 0;
  transition: width 1.2s cubic-bezier(0.22,1,0.36,1);
}

/* FORMULA BANNER */
.formula-banner {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px 32px; margin-bottom: 2.5rem;
}
.formula-label {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--b-teal); margin-bottom: 10px;
}
.formula-eq {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: clamp(18px, 2.5vw, 26px); font-weight: 600;
  color: var(--text); line-height: 1.5;
}
.fw { color: var(--b-teal); font-weight: 700; }

/* CALC CARDS */
.calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.calc-card {
  border-radius: 20px; padding: 36px 32px 30px;
}
.calc-card.v { background: rgba(240,192,0,0.06); border: 1px solid rgba(240,192,0,0.25); }
.calc-card.h { background: rgba(184,144,240,0.06); border: 1px solid rgba(184,144,240,0.25); }
.calc-lake-name {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 20px; font-weight: 700; color: var(--mid); margin-bottom: 22px;
  display: flex; align-items: center; gap: 9px;
}
.calc-steps { display: flex; flex-direction: column; gap: 0; }
.calc-step {
  display: grid; grid-template-columns: 1fr auto auto;
  gap: 12px; align-items: center;
  padding: 14px 0; border-bottom: 1px solid var(--border);
}
.calc-step-desc { font-size: 15px; color: var(--mid); }
.param-label {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-weight: 700; font-size: 16px; color: var(--text);
}
.calc-step-math {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 20px; font-weight: 600; text-align: right; white-space: nowrap;
}
.calc-step-result {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 20px; font-weight: 700; text-align: right; white-space: nowrap;
  min-width: 70px;
}
.calc-sum-line {
  margin-top: 20px; padding-top: 18px;
}
.calc-sum-label {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 14px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--mid); margin-bottom: 5px;
}
.calc-sum-eq {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 20px; color: var(--mid); margin-bottom: 10px;
}
.calc-final-score {
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 64px; font-weight: 800; line-height: 1; letter-spacing: -0.01em;
}
.calc-card.v .calc-final-score { color: var(--varthur); }
.calc-card.h .calc-final-score { color: var(--hesara); }

/* FOOTNOTE */
.footnote {
  margin-top: 4rem; padding-top: 2.5rem; border-top: 1px solid var(--border);
  font-size: 14px; color: #7aa0c0; line-height: 1.75; max-width: 900px;
}

/* SCALE STRIP */
.scale-strip {
  display: flex; border-radius: 14px; overflow: hidden;
  margin-bottom: 2.5rem; height: 52px;
}
.scale-seg {
  display: flex; align-items: center; justify-content: center;
  font-family: &#x27;Barlow Condensed&#x27;, sans-serif;
  font-size: 15px; font-weight: 700; flex: 1; letter-spacing: 0.04em;
}
.scale-seg.s4 { background: rgba(224,80,80,0.20); color: #e07070; }
.scale-seg.s3 { background: rgba(240,160,48,0.20); color: #f0a030; }
.scale-seg.s2 { background: rgba(0,201,167,0.20); color: var(--b-teal); }
.scale-seg.s1 { background: rgba(64,200,240,0.20); color: var(--accent); }
&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;div class=&quot;container&quot;&gt;

&lt;!-- PAGE HEADER --&gt;
&lt;div class=&quot;page-header&quot;&gt;
  &lt;div class=&quot;eyebrow&quot;&gt;BIS IS 2296 : 1992 — Class B · Modified&lt;/div&gt;
  &lt;h1&gt;Recreation &amp;amp; Tourism&lt;br&gt;Water Quality Index&lt;/h1&gt;
  &lt;p class=&quot;subtitle&quot;&gt;
    A modified Recreation and Tourism WQI built from the BIS IS 2296 : 1992 Class B standard
    (Outdoor Bathing — Organised). BOD was not measured at either site and is therefore
    excluded. The four available parameters — total coliform, pH, dissolved oxygen, and
    turbidity — are used in its place, providing a practical, measurement-grounded score
    for recreational suitability.
  &lt;/p&gt;
&lt;/div&gt;

&lt;!-- SECTION 01: CLASS B REFERENCE --&gt;
&lt;div class=&quot;section-header&quot;&gt;
  &lt;div class=&quot;section-number&quot;&gt;01 — Reference Standard&lt;/div&gt;
  &lt;div class=&quot;section-title&quot;&gt;BIS Class B — Outdoor Bathing (Organised)&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;section-intro&quot;&gt;
  Class B covers water bodies intended for organised outdoor bathing, leisure fishing,
  boating, and contact recreation. Our WQI uses three of the four Class B parameters
  (coliform, pH, DO) plus turbidity as a practical visual-quality substitute for the missing BOD measurement.
&lt;/div&gt;

&lt;div class=&quot;class-b-wrapper&quot;&gt;

  &lt;div class=&quot;class-b-card&quot;&gt;
    &lt;div class=&quot;class-b-badge&quot;&gt;B&lt;/div&gt;
    &lt;div class=&quot;class-b-title&quot;&gt;Outdoor Bathing (Organised)&lt;br&gt;BIS IS 2296 : 1992&lt;/div&gt;
    &lt;div class=&quot;class-b-params&quot;&gt;
      &lt;div class=&quot;class-b-row&quot;&gt;
        &lt;span class=&quot;class-b-param-name&quot;&gt;Total Coliform&lt;/span&gt;
        &lt;span class=&quot;class-b-param-val&quot;&gt;≤ 500 MPN / 100 mL&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;class-b-row&quot;&gt;
        &lt;span class=&quot;class-b-param-name&quot;&gt;pH&lt;/span&gt;
        &lt;span class=&quot;class-b-param-val&quot;&gt;6.5 – 8.5&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;class-b-row&quot;&gt;
        &lt;span class=&quot;class-b-param-name&quot;&gt;Dissolved Oxygen&lt;/span&gt;
        &lt;span class=&quot;class-b-param-val&quot;&gt;≥ 5 mg/L&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;class-b-row&quot;&gt;
        &lt;span class=&quot;class-b-param-name&quot;&gt;BOD (5-day, 20 °C)&lt;/span&gt;
        &lt;span class=&quot;class-b-param-val omitted&quot;&gt;≤ 3 mg/L&lt;/span&gt;
        &lt;span class=&quot;omit-tag&quot;&gt;Not Measured&lt;/span&gt;
      &lt;/div&gt;
      &lt;div class=&quot;class-b-row&quot;&gt;
        &lt;span class=&quot;class-b-param-name&quot;&gt;Turbidity &lt;em style=&quot;font-size:12px;font-weight:400;&quot;&gt;(added)&lt;/em&gt;&lt;/span&gt;
        &lt;span class=&quot;class-b-param-val&quot; style=&quot;color:var(--b-teal);&quot;&gt;≤ 5 NTU ideal&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;class-b-note&quot;&gt;
      &lt;strong&gt;Why turbidity?&lt;/strong&gt; Turbidity reflects water clarity and visual quality —
      directly relevant to recreational perception. It replaces BOD as a practical field-measurable
      recreation parameter. Class B does not specify a turbidity limit, so we define a practical
      scoring range based on contact-recreation standards.
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- RECREATION SCENE SVG --&gt;
  &lt;div class=&quot;rec-illustration&quot;&gt;
    &lt;svg viewBox=&quot;0 0 540 340&quot; xmlns=&quot;http://www.w3.org/2000/svg&quot; style=&quot;display:block;width:100%;&quot;&gt;
      &lt;defs&gt;
        &lt;linearGradient id=&quot;sky&quot; x1=&quot;0&quot; y1=&quot;0&quot; x2=&quot;0&quot; y2=&quot;1&quot;&gt;
          &lt;stop offset=&quot;0%&quot; stop-color=&quot;#0b2a45&quot;/&gt;
          &lt;stop offset=&quot;100%&quot; stop-color=&quot;#0d3f62&quot;/&gt;
        &lt;/linearGradient&gt;
        &lt;linearGradient id=&quot;lake&quot; x1=&quot;0&quot; y1=&quot;0&quot; x2=&quot;0&quot; y2=&quot;1&quot;&gt;
          &lt;stop offset=&quot;0%&quot; stop-color=&quot;#0a3a5c&quot;/&gt;
          &lt;stop offset=&quot;100%&quot; stop-color=&quot;#072540&quot;/&gt;
        &lt;/linearGradient&gt;
        &lt;linearGradient id=&quot;mtnL&quot; x1=&quot;0&quot; y1=&quot;0&quot; x2=&quot;0&quot; y2=&quot;1&quot;&gt;
          &lt;stop offset=&quot;0%&quot; stop-color=&quot;#1a4a6e&quot;/&gt;
          &lt;stop offset=&quot;100%&quot; stop-color=&quot;#0e2e48&quot;/&gt;
        &lt;/linearGradient&gt;
        &lt;linearGradient id=&quot;mtnR&quot; x1=&quot;0&quot; y1=&quot;0&quot; x2=&quot;0&quot; y2=&quot;1&quot;&gt;
          &lt;stop offset=&quot;0%&quot; stop-color=&quot;#163d5f&quot;/&gt;
          &lt;stop offset=&quot;100%&quot; stop-color=&quot;#0a2538&quot;/&gt;
        &lt;/linearGradient&gt;
      &lt;/defs&gt;

      &lt;!-- sky --&gt;
      &lt;rect width=&quot;540&quot; height=&quot;340&quot; fill=&quot;url(#sky)&quot;/&gt;

      &lt;!-- stars --&gt;
      &lt;circle cx=&quot;60&quot; cy=&quot;28&quot; r=&quot;1.2&quot; fill=&quot;white&quot; opacity=&quot;0.6&quot;/&gt;
